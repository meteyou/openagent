services:
  axiom:
    image: ghcr.io/meteyou/axiom:latest
    container_name: axiom
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - axiom-data:/data
      - axiom-workspace:/workspace
    environment:
      - TZ=Europe/Vienna
      - NODE_ENV=production
      - DATA_DIR=/data
      - WORKSPACE_DIR=/workspace
      - PORT=3000
      - HOST=0.0.0.0
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}

  # Uncomment to enable local Whisper for speech-to-text
  # whisper:
  #   image: fedirz/faster-whisper-server:latest-cpu
  #   container_name: axiom-whisper
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - WHISPER__MODEL=Systran/faster-whisper-large-v3

  # Uncomment to enable local Ollama for running local LLM models
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: axiom-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   # Uncomment for GPU support (NVIDIA)
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]

volumes:
  axiom-data:
  axiom-workspace:
